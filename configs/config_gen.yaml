dataset:
  data_scaling: True
  batch_sizes:
    stage1: 1024 #32
    stage2: 1024 #32
    stage_neural_mapper: 1024 #32
  num_workers: 0

exp_params:
  lr: 0.008
  linear_warmup_rate: 0.05
  min_lr: 0.0004

trainer_params:
  max_steps:
    stage1: 30000 # 20000 #50000
    stage2: 30000 # 40000
    stage_neural_mapper: 3000 #30000
  val_check_interval:
    stage1: 1000
    stage2: 1000
    stage_neural_mapper: 1000

encoder:
  init_dim: 4
  hid_dim: 128
  n_resnet_blocks: 2
  downsampled_width:
    lf: 8
    hf: 32

decoder:
  n_resnet_blocks: 2

VQ-VAE:
  n_fft: 4
  codebook_sizes:
    lf: 1024
    hf: 1024
  kmeans_init: True
  codebook_dim: 8

MaskGIT:
  choice_temperatures:
    lf: 10
    hf: 0
  T:
    lf: 10
    hf: 10
  prior_model_l:
    hidden_dim: 128
    n_layers: 4
    heads: 2
    ff_mult: 1
    use_rmsnorm: True
    p_unconditional: 0.2
    model_dropout: 0.3
    emb_dropout: 0.3
  prior_model_h:
    hidden_dim: 32
    n_layers: 1
    heads: 1
    ff_mult: 1
    use_rmsnorm: True
    p_unconditional: 0.2
    model_dropout: 0.3
    emb_dropout: 0.3
  cfg_scale: 1.
  ESS:
    use: False
    error_ratio_ma_rate: 0.3

DiT:
  choice_temperatures:
    lf: 10
    hf: 0
  T:
    lf: 10
    hf: 10
  dim: 512
  n_heads: 8
  n_layers: 12
  cfg_scale: 1.0
  p_unconditional: 0.1
  dropout: 0.1
  gamma_mode: "cosine"

neural_mapper:
  dim: 8
  dim_mults:
    - 1
    - 2
    - 4
    - 8
  resnet_block_groups: 4
  dropout: 0.5
  tau_search_rng:
    - 0.1
    - 0.5
    - 1
    - 2
    - 4

evaluation:
  batch_size: 1024
  min_num_gen_samples: 8192

baselines:
  mctimegan:
    epochs: 500
    batch_size: 128
    sample_batch_size: 512
    hidden_dim: 24
    num_layers: 3
    learning_rate: 0.0001
    reproducibility: True
    max_train_samples: 20000
    grad_clip: 1.0
    sqrt_eps: 1.0e-8
  diffusion_ts:
    max_epochs: 4000
    save_cycle: 400
    batch_size: 4
    sample_batch_size: 16
    base_lr: 0.0001
    gradient_accumulate_every: 8
    log_every_steps: 100
    timesteps: 500
    sampling_timesteps: 100
    d_model: 64
    n_layer_enc: 3
    n_layer_dec: 2
    n_heads: 4
    mlp_hidden_times: 4
    size_every: 1001
    max_train_samples: 20000
  timedp:
    max_steps: 20000
    batch_size: 128
    learning_rate: 0.0001
    seed: 23
    num_latents: 16
    logdir: logs_official_baselines
    max_train_samples: 20000

